<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="responsive.css">
  <script src="index.js" defer></script>
</head>

<body>
  <header>
    <img src="./photos/Movie.svg" alt="movie" />
    <nav class="photos-div">
      <img src="./photos/Add.svg" alt="add" />
      <img src="./photos/Shape.svg" alt="shape" />
      <img src="./photos/tv.svg" alt="tv" />
      <img src="./photos/Bookmark.svg" alt="bookmark" />
    </nav>
    <img src="./photos/Oval.svg" alt="profile" />
  </header>
  <form id="form">
    <button type="submit" class="search_btn" id="search_btn">
      <img src="./photos/search.svg" alt="search" />
    </button>
    <input type="search" placeholder="Search for TV series" id="search" />
  </form>
  <h3>TV Series</h3>
  <main id="divs-droper"></main>

</html>
